<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="addTask">
        <input type="text" name="" id="taskName">
        <input type="button" value="Add Task" id="addButton">
    </div>
    <div id="kanbanContainer">
        <div id="todoContainer">
            <h2>Todo</h2>
        </div>
        <div id="inProgress">
            <h2>In-progress</h2>
        </div>
        <div id="completed">
            <h2>Completed</h2>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
