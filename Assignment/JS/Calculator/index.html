<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Apna Calculator</h1>
    <div class="calculator">
        <div id="output">
            <div>0</div>
        </div>
        <div class="inputs">
            <span id="1">1</span>
            <span id="2">2</span>
            <span id="3">3</span>
            <span id="4">4</span>
            <span id="5">5</span>
            <span id="6">6</span>
            <span id="7">7</span>
            <span id="8">8</span>
            <span id="9">9</span>
            <span id="0">0</span>
            <span id="plus">+</span>
            <span id="minus">-</span>
            <span id="multiply">*</span>
            <span id="divide">/</span>
            <span id="calculate">=</span>
            <span id="clear">CE</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
